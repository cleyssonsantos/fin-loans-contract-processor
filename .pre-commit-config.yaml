repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: Ruff lint
        entry: ruff check src/ tests/
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: MyPy type check
        entry: mypy src/
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: Pytest
        entry: pytest tests/ -v
        language: system
        pass_filenames: false
