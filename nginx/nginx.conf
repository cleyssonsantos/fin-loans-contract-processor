# O resolver 127.0.0.11 é o DNS interno do Docker.
# Com valid=5s, o Nginx re-resolve o nome 'api' periodicamente.
# Usar uma variável ($upstream) em vez de bloco upstream é o que força
# o Nginx a consultar o DNS em cada requisição (dentro do TTL),
# permitindo que o Docker distribua o tráfego entre as réplicas.
resolver 127.0.0.11 valid=5s;

server {
    listen 80;

    location / {
        set $upstream api:8000;
        proxy_pass http://$upstream;

        # Repassa headers relevantes para a API
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Identifica qual instância da API atendeu a requisição.
        # Útil para validar distribuição de carga em ambiente com múltiplas réplicas.
        add_header X-Upstream-Addr $upstream_addr always;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
