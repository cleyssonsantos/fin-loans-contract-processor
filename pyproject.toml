[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
addopts = ["-m", "not integration"]
filterwarnings = [
    "ignore::DeprecationWarning:jose",
]
markers = [
    "integration: requer stack completo rodando com Nginx e múltiplas instâncias da API (make scale)",
]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true

[tool.coverage.run]
source = ["src"]
omit = ["tests/*"]
